version: "2"
sql:
  - engine: "sqlite"
    schema: "internal/core/db/migrations"
    queries: "internal/core/db/query"
    gen:
      go:
        package: "db"
        out: "internal/core/db"
        emit_interface: true
        emit_json_tags: true
        emit_empty_slices: true
        emit_pointers_for_null_types: false
