<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Platbor</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: #f5f4f0;
        color: #0b1220;
      }
      .card {
        padding: 2rem 2.5rem;
        border-radius: 1rem;
        background: #fff;
        border: 1px solid rgba(226, 232, 240, 0.8);
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04), 0 8px 24px -12px rgba(15, 23, 42, 0.12);
        text-align: center;
      }
      code { font-family: ui-monospace, monospace; background: #f1f5f9; padding: 0.1rem 0.4rem; border-radius: 0.375rem; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Platbor</h1>
      <p>The API is running. The frontend has not been built yet.</p>
      <p>Run <code>npm --prefix web install &amp;&amp; npm --prefix web run build</code>, then rebuild the binary.</p>
    </div>
  </body>
</html>
